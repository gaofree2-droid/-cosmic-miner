<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0b1a">
<title>⚡ Cosmic Miner — Telegram Mini Game</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0b1a;color:#e0e8f0;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  :root{--neon-cyan:#00f0ff;--neon-purple:#a855f7;--neon-pink:#ec4899;--neon-yellow:#facc15;--neon-green:#22d3a7;--bg-primary:#0a0b1a;--bg-card:rgba(255,255,255,0.04);--bg-glass:rgba(255,255,255,0.06);--text-primary:#e0e8f0;--text-secondary:rgba(255,255,255,0.55);--safe-bottom:env(safe-area-inset-bottom,0px)}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
  #starfield{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 0%,#12142e 0%,#0a0b1a 70%)}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite alternate}
  @keyframes twinkle{0%{opacity:0.2;transform:scale(0.8)}100%{opacity:1;transform:scale(1.2)}}
  .header{position:relative;z-index:10;padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(10,11,26,0.95) 0%,transparent 100%)}
  .header-left{display:flex;align-items:center;gap:8px}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,0.15)}
  .user-name{font-size:14px;font-weight:600;color:var(--text-primary)}
  .level-badge{font-size:11px;padding:2px 10px;border-radius:20px;background:rgba(168,85,247,0.2);color:var(--neon-purple);border:1px solid rgba(168,85,247,0.3);font-weight:600}
  .coin-display{position:relative;z-index:10;padding:4px 16px 8px;display:flex;justify-content:space-between;align-items:center}
  .coin-count{display:flex;align-items:center;gap:6px;font-size:28px;font-weight:800;background:linear-gradient(135deg,#facc15,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .energy-display{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text-secondary)}
  .energy-bar-bg{width:80px;height:6px;border-radius:6px;background:rgba(255,255,255,0.1);overflow:hidden}
  .energy-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--neon-cyan),var(--neon-green));border-radius:6px;transition:width 0.4s ease}
  .tap-area{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .asteroid{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a3d6b,#1e2040);box-shadow:0 0 60px rgba(0,240,255,0.08),inset 0 -20px 40px rgba(0,0,0,0.4),inset 0 20px 40px rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform 0.06s ease;border:1px solid rgba(0,240,255,0.15)}
  .asteroid:active{transform:scale(0.92)}
  .asteroid-inner{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#2a2d55,#151730);display:flex;align-items:center;justify-content:center;font-size:48px;user-select:none;border:1px solid rgba(255,255,255,0.05)}
  .asteroid-cracks{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 20% 30%,rgba(0,240,255,0.06) 0%,transparent 40%),radial-gradient(circle at 70% 60%,rgba(168,85,247,0.06) 0%,transparent 40%),radial-gradient(circle at 50% 80%,rgba(236,72,153,0.04) 0%,transparent 30%);pointer-events:none}
  .tap-particle{position:absolute;pointer-events:none;font-size:20px;font-weight:800;color:var(--neon-yellow);animation:floatUp 0.8s ease-out forwards;z-index:20;text-shadow:0 0 10px rgba(250,204,21,0.6)}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}
  .mine-flash{position:absolute;inset:0;border-radius:50%;pointer-events:none;animation:flash 0.2s ease-out forwards}
  @keyframes flash{0%{background:radial-gradient(circle,rgba(0,240,255,0.3),transparent 70%)}100%{background:transparent}}
  .bottom-area{position:relative;z-index:10;padding:0 12px calc(12px + var(--safe-bottom))}
  .ad-reward-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));color:#fff;font-size:15px;font-weight:700;box-shadow:0 4px 20px rgba(168,85,247,0.3);cursor:pointer;margin-bottom:8px;transition:transform 0.15s ease,box-shadow 0.15s ease;position:relative;overflow:hidden}
  .ad-reward-btn:active{transform:scale(0.97);box-shadow:0 2px 10px rgba(168,85,247,0.2)}
  .ad-reward-btn .icon{font-size:20px}
  .ad-reward-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--neon-yellow);color:#1a1a2e;font-size:10px;font-weight:800;padding:2px 6px;border-radius:8px}
  .ad-reward-btn .shimmer{position:absolute;inset:0;border-radius:14px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.15) 50%,transparent 100%);animation:shimmer 2s ease-in-out infinite;pointer-events:none}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .banner-ad{width:100%;height:50px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,0.03),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-secondary);gap:6px;position:relative;overflow:hidden}
  .banner-ad .ad-label{position:absolute;top:3px;left:6px;font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,0.08);text-transform:uppercase;letter-spacing:1px}
  .coin-rain{position:fixed;inset:0;pointer-events:none;z-index:100}
  .coin-drop{position:absolute;font-size:22px;animation:coinFall 1.2s linear forwards}
  @keyframes coinFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(360deg)}}
  .xp-bar-wrap{position:relative;z-index:10;padding:0 16px 4px;display:flex;align-items:center;gap:8px}
  .xp-bar-bg{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden}
  .xp-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--neon-purple),var(--neon-pink));border-radius:4px;transition:width 0.5s ease}
  .xp-label{font-size:11px;color:var(--text-secondary);white-space:nowrap}
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px}
  .modal-overlay.active{display:flex}
  .modal-box{background:linear-gradient(135deg,#1a1b35,#0e0f24);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5);text-align:center}
  .modal-box h2{font-size:20px;margin-bottom:16px}
  .modal-box p{font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
  .modal-rewards{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .modal-reward-item{background:var(--bg-card);padding:12px 16px;border-radius:12px;text-align:center;min-width:80px;border:1px solid rgba(255,255,255,0.06)}
  .modal-reward-item .r-icon{font-size:24px;display:block;margin-bottom:4px}
  .modal-reward-item .r-label{font-size:11px;color:var(--text-secondary)}
  .modal-btn{display:inline-block;padding:12px 32px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.15s ease}
  .modal-btn:active{transform:scale(0.96)}
  .modal-btn.primary{background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));color:#fff;box-shadow:0 4px 15px rgba(168,85,247,0.3)}
  .modal-btn.secondary{background:var(--bg-glass);color:var(--text-secondary);margin-left:8px;border:1px solid rgba(255,255,255,0.06)}
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;padding:12px 24px;border-radius:12px;background:rgba(10,11,26,0.92);color:#fff;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity 0.3s ease;text-align:center}
  .toast.show{opacity:1}
  @media(min-width:480px){.asteroid{width:240px;height:240px}.asteroid-inner{width:168px;height:168px;font-size:56px}}
  @media(max-width:360px){.coin-count{font-size:22px}.asteroid{width:160px;height:160px}.asteroid-inner{width:112px;height:112px;font-size:36px}}
</style>
</head>
<body>
<div id="app">
  <div id="starfield"></div>
  <div class="header">
    <div class="header-left"><div class="user-avatar" id="avatar">👤</div><span class="user-name" id="userName">Miner</span></div>
    <div class="level-badge" id="levelBadge">Lv.1</div>
  </div>
  <div class="xp-bar-wrap">
    <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpFill"></div></div>
    <span class="xp-label" id="xpLabel">0/100</span>
  </div>
  <div class="coin-display">
    <div class="coin-count">🪙 <span id="coinCount">0</span></div>
    <div class="energy-display">⚡ <span id="energyText">100/100</span><div class="energy-bar-bg"><div class="energy-bar-fill" id="energyFill"></div></div></div>
  </div>
  <div class="tap-area" id="tapArea">
    <div class="asteroid" id="asteroid"><div class="asteroid-cracks"></div><div class="asteroid-inner">💎</div></div>
  </div>
  <div class="bottom-area">
    <button class="ad-reward-btn" id="adRewardBtn"><div class="shimmer"></div><span class="icon">📺</span><span>看广告得奖励</span><span class="badge">🔥</span></button>
    <div class="banner-ad" id="bannerAd"><span class="ad-label">AD</span><div class="ad-placeholder"><span>📢</span><span>底部横幅广告位</span></div></div>
  </div>
</div>
<div class="modal-overlay" id="watchAdModal">
  <div class="modal-box">
    <h2>📺 观看广告</h2>
    <p>观看一个短视频，即可获得以下奖励！</p>
    <div class="modal-rewards">
      <div class="modal-reward-item"><span class="r-icon">⚡</span><div class="r-label">能量全满</div></div>
      <div class="modal-reward-item"><span class="r-icon">🪙</span><div class="r-label">+50 金币</div></div>
      <div class="modal-reward-item"><span class="r-icon">🚀</span><div class="r-label">2x 收益 10s</div></div>
    </div>
    <div><button class="modal-btn primary" id="watchAdConfirm">🎬 观看广告</button><button class="modal-btn secondary" id="watchAdCancel">算了</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){
  'use strict';
  var tg=null;try{tg=window.Telegram?.WebApp;if(tg){tg.expand();tg.setHeaderColor('#0a0b1a')}}catch(e){}
  var initData=tg?.initDataUnsafe||{};var user=initData.user||{};
  var $=function(id){return document.getElementById(id)};
  var coinCount=$('coinCount'),energyText=$('energyText'),energyFill=$('energyFill'),asteroid=$('asteroid'),tapArea=$('tapArea'),xpFill=$('xpFill'),xpLabel=$('xpLabel'),levelBadge=$('levelBadge'),userName=$('userName'),avatar=$('avatar'),toast=$('toast'),watchAdModal=$('watchAdModal'),bannerAd=$('bannerAd');
  var state={coins:0,energy:100,maxEnergy:100,level:1,xp:0,xpToNext:100,coinPerTap:1,energyRegenRate:1,energyRegenInterval:5000,multiplier:1,multiplierTimer:null,multiplierEnd:0,adWatchCount:0};
  function loadGame(){try{var saved=localStorage.getItem('cosmic_miner_save');if(saved){var parsed=JSON.parse(saved);Object.assign(state,parsed);state.energy=Math.min(state.energy,state.maxEnergy)}}catch(e){}}
  function saveGame(){try{localStorage.setItem('cosmic_miner_save',JSON.stringify(state))}catch(e){}}
  function updateUI(){
    coinCount.textContent=Math.floor(state.coins);
    energyText.textContent=Math.floor(state.energy)+'/'+state.maxEnergy;
    var pct=(state.energy/state.maxEnergy)*100;energyFill.style.width=Math.min(pct,100)+'%';
    xpFill.style.width=(state.xp/state.xpToNext)*100+'%';xpLabel.textContent=Math.floor(state.xp)+'/'+state.xpToNext;
    levelBadge.textContent='Lv.'+state.level;
    var adBtn=$('adRewardBtn');
    if(state.multiplier>1){var remain=Math.ceil((state.multiplierEnd-Date.now())/1000);adBtn.innerHTML='<div class="shimmer"></div><span class="icon">🚀</span><span>加成中 '+remain+'s</span><span class="badge">'+state.multiplier+'x</span>'}
    else{adBtn.innerHTML='<div class="shimmer"></div><span class="icon">📺</span><span>看广告得奖励</span><span class="badge">🔥</span>'}
  }
  var toastTimer=null;
  function showToast(msg,duration){duration=duration||1800;toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){toast.classList.remove('show')},duration)}
  function coinRain(count){count=count||15;var container=document.createElement('div');container.className='coin-rain';document.body.appendChild(container);var emojis=['🪙','✨','💎','⭐'];for(var i=0;i<count;i++){var el=document.createElement('div');el.className='coin-drop';el.textContent=emojis[i%emojis.length];el.style.left=Math.random()*90+'%';el.style.animationDelay=Math.random()*0.4+'s';el.style.fontSize=(18+Math.random()*14)+'px';container.appendChild(el)}setTimeout(function(){container.remove()},2000)}
  function handleTap(e){
    if(state.energy<1){showToast('⚡ 能量不足！看广告恢复能量');return}
    state.energy=Math.max(0,state.energy-1);
    var earned=state.coinPerTap*state.multiplier;state.coins+=earned;state.xp+=earned;
    while(state.xp>=state.xpToNext){state.xp-=state.xpToNext;state.level++;state.xpToNext=Math.floor(100*Math.pow(1.25,state.level-1));state.coinPerTap=1+(state.level-1)*0.5;state.maxEnergy=100+(state.level-1)*10;state.energy=state.maxEnergy;showToast('🎉 升级！达到 Lv.'+state.level);coinRain(20)}
    var flash=document.createElement('div');flash.className='mine-flash';asteroid.appendChild(flash);setTimeout(function(){flash.remove()},200);
    var particle=document.createElement('div');particle.className='tap-particle';particle.textContent='+'+(Math.floor(earned));
    var rect=asteroid.getBoundingClientRect();var appRect=document.getElementById('app').getBoundingClientRect();
    particle.style.left=(rect.left-appRect.left+rect.width/2-20+(Math.random()-0.5)*60)+'px';particle.style.top=(rect.top-appRect.top+rect.height/2-20)+'px';tapArea.appendChild(particle);setTimeout(function(){particle.remove()},800);
    if(Math.random()<0.05)coinRain(5);updateUI();saveGame();
  }
  setInterval(function(){if(state.energy<state.maxEnergy){state.energy=Math.min(state.maxEnergy,state.energy+state.energyRegenRate);updateUI();saveGame()}},state.energyRegenInterval);
  setInterval(function(){if(state.multiplier>1&&Date.now()>state.multiplierEnd){state.multiplier=1;state.multiplierTimer=null;showToast('⏱️ 加成已结束');updateUI();saveGame()}},1000);
  function showWatchAdModal(){watchAdModal.classList.add('active')}
  function closeModal(){watchAdModal.classList.remove('active')}
  function watchAd(){
    closeModal();showToast('📺 正在播放广告...');$('watchAdConfirm').disabled=true;
    setTimeout(function(){
      state.energy=state.maxEnergy;state.coins+=50;state.xp+=50;state.adWatchCount++;
      if(state.multiplierTimer)clearTimeout(state.multiplierTimer);
      state.multiplier=2;state.multiplierEnd=Date.now()+10000;
      showToast('🎉 奖励已领取！能量全满 + 50金币 + 2x加成10s！');coinRain(25);updateUI();saveGame();$('watchAdConfirm').disabled=false;
      while(state.xp>=state.xpToNext){state.xp-=state.xpToNext;state.level++;state.xpToNext=Math.floor(100*Math.pow(1.25,state.level-1));state.coinPerTap=1+(state.level-1)*0.5;state.maxEnergy=100+(state.level-1)*10;state.energy=state.maxEnergy;showToast('🎉 升级！达到 Lv.'+state.level);coinRain(20)}
    },1500);
  }
  bannerAd.addEventListener('click',function(){showToast('📢 横幅广告位 — 接入广告后生效')});
  function init(){
    loadGame();
    if(user.first_name){userName.textContent=user.first_name||'Miner';avatar.textContent=(user.first_name[0]||'👤').toUpperCase()}
    updateUI();
    asteroid.addEventListener('pointerdown',handleTap);
    $('adRewardBtn').addEventListener('click',showWatchAdModal);
    $('watchAdConfirm').addEventListener('click',watchAd);
    $('watchAdCancel').addEventListener('click',closeModal);
    watchAdModal.addEventListener('click',function(e){if(e.target===watchAdModal)closeModal()});
    setInterval(saveGame,10000);
    var sf=$('starfield');
    for(var i=0;i<80;i++){var star=document.createElement('div');star.className='star';var size=1+Math.random()*2.5;star.style.width=size+'px';star.style.height=size+'px';star.style.left=Math.random()*100+'%';star.style.top=Math.random()*100+'%';star.style.setProperty('--dur',(2+Math.random()*4)+'s');star.style.animationDelay=Math.random()*4+'s';sf.appendChild(star)}
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}else{init()}
})();
</script>
</body>
</html>
